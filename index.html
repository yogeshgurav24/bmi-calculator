<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>BMI Calculator</h2>
        <form id="bmiForm">
            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age" min="1" max="120" required placeholder="Enter age">
            </div>

            <div class="input-group">
                <label>Gender</label>
                <div class="gender-radio">
                    <input type="radio" id="male" name="gender" value="Male" checked>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>
                </div>
            </div>

            <div class="input-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" min="50" max="250" required placeholder="e.g., 175">
            </div>

            <div class="input-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" min="1" max="500" required placeholder="e.g., 70">
            </div>

            <button type="submit" id="submitBtn">Calculate BMI</button>
        </form>

        <div id="resultCard" class="result-card hidden">
            <h3>Your Result</h3>
            <p id="bmiValue" class="bmi-value">0.0</p>
            <p id="bmiStatus" class="bmi-status">Normal</p>
            <p id="bmiDetails"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
